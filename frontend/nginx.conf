# Running as non-root user will trigger warning.
# user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
# Running as non-root user will trigger warning
# for default /var/run/ prefix.
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;
    server_tokens   off;
    keepalive_timeout  120;

    client_max_body_size 150M;
    
    gzip  on;

    # Non-root user will not have access to default
    # /var/cache/nginx/ prefix.
    client_body_temp_path   /tmp/client_temp 1 2;
    proxy_temp_path         /tmp/proxy_temp 1 2;
    fastcgi_temp_path       /tmp/fastcgi_temp 1 2;
    uwsgi_temp_path         /tmp/uwsgi_temp 1 2;
    scgi_temp_path          /tmp/scgi_temp 1 2;

    # Extend timeouts
    proxy_connect_timeout   240s; 
    proxy_send_timeout      240s;  
    proxy_read_timeout      240s;
    send_timeout            240s;   

    server {
        listen 80;
        root  /usr/share/nginx/html;
        include /etc/nginx/mime.types;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' wss: ws: https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

        # If a react app URI is directly accessed we will get 404
        # since there will be no file representing that path.
        # Below config will load index.html file in such case and
        # browser will load the proper path using JS.
        location / {
            try_files $uri /index.html;
        }
        # Proxy WebSocket (Socket.IO) to backend — must come before /api/
        location /api/v1/socket/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Proxy API requests to backend
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout   360s;
            proxy_send_timeout      360s;
            proxy_read_timeout      360s;
            send_timeout            360s;
        }
    }
}
